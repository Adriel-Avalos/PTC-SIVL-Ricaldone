<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./css/login.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <div class="container-fluid">

        <div class="row login-container">

            <!-- IZQUIERDA -->
            <div class="col-lg-6 left-side">

                <div class="login-box">

                    <!-- LOGO -->
                    <img src="img/unnamed.jpg" alt="Logo" class="logo">

                    <!-- TITULO -->
                    <h1 class="title text-center">
                        Bienvenido al <br>
                        Portal de Talento Técnico itr
                    </h1>

                    <p class="subtitle text-center">
                        Ingresa tus credenciales para acceder al sistema
                    </p>

                    <!-- FORMULARIO -->
                    <form id="loginForm">

                        <div class="mb-4">
                            <label class="form-label">
                                Gmail Personal
                            </label>

                            <input 
                                type="email"
                                class="form-control custom-input"
                                id="email"
                                placeholder=""
                                required
                            >
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Contraseña
                            </label>

                            <input 
                                type="password"
                                class="form-control custom-input"
                                id="password"
                                placeholder=""
                                required
                            >
                        </div>

                        <button type="submit" class="btn-login">
                            Iniciar Sesión
                        </button>

                    </form>

                    <!-- FOOTER -->
                    <div class="footer-text">
                        Desarrollado por el departamento de Desarrollo de Software <br>
                        del <a href="#">Instituto Técnico Ricaldone</a>
                    </div>

                </div>

            </div>

            <!-- DERECHA -->
            <div class="col-lg-6 right-side p-0">

                <img src="fondo.jpg" alt="Imagen fondo">

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script>

        const form = document.getElementById('loginForm');

        form.addEventListener('submit', function(e){

            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(email === "" || password === ""){
                alert("Completa todos los campos");
                return;
            }

            alert("Inicio de sesión exitoso");

            console.log(email);
            console.log(password);

        });

    </script>

</body>
</html>
